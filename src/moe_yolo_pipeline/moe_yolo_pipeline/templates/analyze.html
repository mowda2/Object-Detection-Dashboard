<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Offline Analysis</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .container { max-width: 1100px; margin: 0 auto; padding: 14px; }
    .panel { background:#0f1419; border-radius:12px; padding:14px; margin:12px 0; }
    .row { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .muted { color:#8ea0b3; }
    .btn { background:#2a2f36; color:#fff; border:none; padding:8px 12px; border-radius:8px; cursor:pointer; }
    .btn:hover { background:#36404b; }
    .btn-secondary { background:#1f2530; }
    .btn-secondary:hover { background:#2a3140; }
    video, img.preview { width:100%; max-height:60vh; background:#000; border-radius:10px; }
    .hidden { display:none; }
    .grid3 { display:grid; grid-template-columns: repeat(3, 1fr); gap:12px; }
    .card { background:#111821; border:1px solid #1b2230; border-radius:10px; padding:12px; }
    .card-muted { background:#0f151c; }
    .card-title { font-weight:600; margin-bottom:8px; }
    .big { font-size:28px; font-weight:700; margin-top:4px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    .table-compact { width:100%; border-collapse: collapse; font-size:14px; }
    .table-compact th, .table-compact td { border-bottom:1px solid #1d2733; padding:6px 8px; text-align:left; }
    .table-compact th { color:#a6b4c6; font-weight:600; }
    details summary { cursor:pointer; color:#9fb2c8; }
    .spacer { flex:1 1 auto; }
  </style>
</head>
<body>
<div class="container">
  <h1>Offline Analysis</h1>

  <div class="panel">
    <a href="/" class="btn">← Back</a>
  </div>

  <div class="panel">
    <h3>Upload Source</h3>
    <form id="form" class="row">
      <input type="file" id="file" name="file" accept=".mp4,.mov,.avi,.mkv,.m4v,.webm,.db3,.bag" required>
      <label>Model:</label>
      <input type="text" id="model" name="model" value="yolov8n.pt" size="14">
      <label>Conf:</label>
      <input type="number" id="conf" name="conf" value="0.30" step="0.01" min="0" max="1" style="width:80px">
      <label>Line:</label>
      <select id="line_mode" name="line_mode">
        <option value="horizontal" selected>Horizontal mid-line</option>
        <option value="vertical">Vertical mid-line</option>
      </select>
      <button class="btn" type="submit">Start Analysis</button>
    </form>

    <div class="row muted" id="jobline" style="margin-top:8px; display:none;">
      Job: <span id="jobid" class="mono"></span>
      &nbsp; State: <span id="state">queued</span>
      &nbsp; Progress: <span id="prog">0%</span>
      &nbsp; Message: <span id="msg">—</span>
      <div class="spacer"></div>
    </div>
    <div style="height:8px; background:#1c232a; border-radius:4px; margin-top:8px;">
      <div id="bar" style="height:8px; width:0; background:#4f8cff; border-radius:4px;"></div>
    </div>
  </div>

  <div class="panel">
    <h3>Results</h3>
    <div class="row" style="margin-bottom:8px;">
      <button id="btnCounts" class="btn btn-secondary hidden" type="button">Show Counts</button>
      <a id="btn_csv" class="btn hidden" href="#" download>Download CSV</a>
      <a id="btn_json" class="btn hidden" href="#" download>Download JSON</a>
    </div>

    <!-- Primary: MP4 -->
    <video id="vid" class="hidden" controls playsinline muted></video>
    <!-- Fallback: MJPEG -->
    <img id="mjpeg" class="preview hidden" alt="Preview">
    <div id="note" class="muted hidden" style="margin-top:8px;">
      Your browser couldn’t play the MP4. Showing MJPEG preview instead.
    </div>

    <!-- Counts panel -->
    <div id="countsPanel" class="hidden" style="margin-top:14px;"></div>
  </div>
</div>

<script>
const form    = document.getElementById('form');
const jobline = document.getElementById('jobline');
const jobid   = document.getElementById('jobid');
const state   = document.getElementById('state');
const prog    = document.getElementById('prog');
const msg     = document.getElementById('msg');
const bar     = document.getElementById('bar');

const vid     = document.getElementById('vid');
const mjpeg   = document.getElementById('mjpeg');
const note    = document.getElementById('note');
const btnCSV  = document.getElementById('btn_csv');
const btnJSON = document.getElementById('btn_json');
const btnCounts = document.getElementById('btnCounts');
const countsPanel = document.getElementById('countsPanel');

let curJob = null;
let pollTimer = null;
window.currentJobId = null; // for other scripts if needed

form.addEventListener('submit', async (e) => {
  e.preventDefault();

  // hide old results
  countsPanel.classList.add('hidden');
  countsPanel.innerHTML = '';
  btnCSV.classList.add('hidden');
  btnJSON.classList.add('hidden');
  btnCounts.classList.add('hidden');
  vid.classList.add('hidden');
  mjpeg.classList.add('hidden');
  note.classList.add('hidden');

  const fd = new FormData(form);
  try {
    // Kick off analysis (alias endpoint)
    const r = await fetch('/api/analyze', { method:'POST', body: fd });
    if (!r.ok) throw new Error(await r.text());
    const out = await r.json();
    curJob = out.job_id;
    window.currentJobId = curJob;
    jobid.textContent = curJob;
    jobline.style.display = 'flex';
    bar.style.width = '0%';
    prog.textContent = '0%';
    state.textContent = 'queued';
    msg.textContent = 'Starting…';
    poll();
  } catch (err) {
    alert(err);
  }
});

async function poll() {
  if (!curJob) return;
  clearTimeout(pollTimer);
  try {
    const r = await fetch('/api/analyze/status?job=' + encodeURIComponent(curJob));
    if (!r.ok) throw new Error(await r.text());
    const s = await r.json();
    state.textContent = s.state;
    prog.textContent  = (s.progress||0) + '%';
    msg.textContent   = s.message || '—';
    bar.style.width   = Math.max(0, Math.min(100, s.progress||0)) + '%';

    if (s.state === 'done') {
      finish(curJob, s);
      return;
    }
  } catch (err) {
    console.warn(err);
  }
  pollTimer = setTimeout(poll, 800);
}

function finish(job, s) {
  // Set download links if available
  if (s.csv)  { btnCSV.href = s.csv;  btnCSV.classList.remove('hidden'); }
  if (s.json) { btnJSON.href = s.json; btnJSON.classList.remove('hidden'); }

  // Try MP4 first
  const mp4Url = `/jobs/${encodeURIComponent(job)}/video`;
  vid.src = mp4Url;
  vid.classList.remove('hidden');
  vid.onerror = () => {
    // Fallback to MJPEG
    vid.classList.add('hidden');
    const mjUrl = `/jobs/${encodeURIComponent(job)}/preview.mjpeg`;
    mjpeg.src = mjUrl;
    mjpeg.classList.remove('hidden');
    note.classList.remove('hidden');
  };

  // Enable counts button and auto-fetch once
  btnCounts.classList.remove('hidden');
  fetchCounts(); // auto show once job is done
}

async function fetchCounts() {
  if (!window.currentJobId) return;
  btnCounts.disabled = true;
  try {
    const r = await fetch(`/api/analyze/summary?job=${encodeURIComponent(window.currentJobId)}`);
    const j = await r.json();
    if (!j.ok) throw new Error(j.error || "Failed to load counts");

    const cats = j.categories || {};
    const byClass = j.by_class || {};
    const byDir = j.by_direction || {};
    const byClassDir = j.by_class_dir || {};

    const html = `
      <div class="card card-muted">
        <div class="card-title">Counts (line crossings)</div>
        <div class="grid3">
          <div><b>Pedestrians</b><div class="big">${cats.pedestrians ?? 0}</div></div>
          <div><b>Bicycles</b><div class="big">${cats.bicycles ?? 0}</div></div>
          <div><b>Cars</b><div class="big">${cats.cars ?? 0}</div></div>
        </div>
        <hr style="border-color:#1d2733; margin:10px 0;" />
        <div><b>By direction</b> &nbsp; <span class="mono">A→B</span>: ${byDir["A->B"] ?? 0} &nbsp; | &nbsp; <span class="mono">B→A</span>: ${byDir["B->A"] ?? 0}</div>
        <details style="margin-top:8px;">
          <summary>All classes</summary>
          <table class="table-compact">
            <thead><tr><th>Class</th><th>Total</th><th>A→B</th><th>B→A</th></tr></thead>
            <tbody>
              ${Object.keys(byClass).sort().map(k => {
                const d = byClassDir[k] || {};
                return `<tr><td>${k}</td><td>${byClass[k]}</td><td>${(d["A->B"]||0)}</td><td>${(d["B->A"]||0)}</td></tr>`;
              }).join("")}
            </tbody>
          </table>
        </details>
      </div>`;
    countsPanel.innerHTML = html;
    countsPanel.classList.remove('hidden');
  } catch (e) {
    alert(e.message || e);
  } finally {
    btnCounts.disabled = false;
  }
}
btnCounts.addEventListener('click', fetchCounts);
</script>
</body>
</html>
