<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>YOLO Multi-View</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap:14px; }
    .tile { background:#111; border-radius:10px; padding:8px; box-shadow:0 2px 6px rgba(0,0,0,.25); }
    .tile .title { color:#a6e3a1; font-size:12px; margin-bottom:6px; font-family:monospace; }
    .tile img { width:100%; border-radius:8px; }
    .toolbar { display:flex; gap:8px; align-items:center; margin-bottom:10px; }
    .toolbar input { width:80px; }
  </style>
</head>
<body>
<div class="container">
  <div class="toolbar">
    <button class="btn" onclick="loadTopics()">Refresh Topics</button>
    <span id="count" class="muted"></span>
    <label>Width:</label><input id="w" value="720">
    <label>FPS:</label><input id="fps" value="10">
    <label>JPEG Q:</label><input id="q" value="80">
  </div>
  <div id="grid" class="grid"></div>
</div>

<script>
async function loadTopics() {
  const r = await fetch('/api/topics');
  const data = await r.json();
  const topics = data.topics || [];
  const g = document.getElementById('grid');
  g.innerHTML = '';
  const w = document.getElementById('w').value;
  const fps = document.getElementById('fps').value;
  const q = document.getElementById('q').value;
  topics.forEach(t => {
    const div = document.createElement('div');
    div.className = 'tile';
    const title = document.createElement('div');
    title.className = 'title';
    title.textContent = t;
    const img = document.createElement('img');
    img.src = `/stream?topic=${encodeURIComponent(t)}&w=${w}&fps=${fps}&q=${q}`;
    div.appendChild(title);
    div.appendChild(img);
    g.appendChild(div);
  });
  document.getElementById('count').textContent = `${topics.length} stream(s)`;
}
loadTopics();
</script>
</body>
</html>
