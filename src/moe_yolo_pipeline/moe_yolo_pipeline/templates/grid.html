<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <title>YOLO Multi-View</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 14px;
    }

    .tile {
      background: #111;
      border-radius: 10px;
      padding: 8px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, .25);
    }

    .tile .title {
      color: #a6e3a1;
      font-size: 12px;
      margin-bottom: 6px;
      font-family: monospace;
    }

    .tile img {
      width: 100%;
      border-radius: 8px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }

    /* ▼ Fancy Navigate dropdown (same look as index) */
    .navmenu {
      position: relative;
      display: inline-block;
      margin-left: auto
    }

    .navbtn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      font-weight: 600;
      font-size: 14px;
      background: linear-gradient(180deg, #2a3442 0%, #1f2937 100%);
      border: 1px solid #3a4b63;
      color: #e7f0ff;
      box-shadow: 0 6px 22px rgba(0, 0, 0, .35), inset 0 0 0 1px rgba(255, 255, 255, .04);
      cursor: pointer;
      transition: transform .06s ease, box-shadow .12s ease, background .12s ease;
    }

    .navbtn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 28px rgba(0, 0, 0, .45), inset 0 0 0 1px rgba(255, 255, 255, .06);
    }

    .navbtn:active {
      transform: translateY(0);
    }

    .navbtn .dot {
      width: 8px;
      height: 8px;
      background: #8dd0ff;
      border-radius: 999px;
      box-shadow: 0 0 0 3px rgba(141, 208, 255, .15)
    }

    .navbtn .caret {
      transition: transform .15s ease;
      opacity: .9
    }

    .navmenu.open .navbtn .caret {
      transform: rotate(180deg)
    }

    .menu {
      position: absolute;
      right: 0;
      top: 44px;
      min-width: 240px;
      padding: 8px;
      background: #111826;
      border: 1px solid #2c3642;
      border-radius: 12px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, .55);
      z-index: 20;
      animation: fadeIn .12s ease;
    }

    .menu a {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 10px;
      border-radius: 8px;
      color: #dbeafe;
      text-decoration: none;
      font-size: 14px;
    }

    .menu a:hover {
      background: #223046
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-4px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="toolbar">
      <button class="btn" onclick="loadTopics()">Refresh Topics</button>
      <span id="count" class="muted"></span>
      <label>Width:</label><input id="w" value="720">
      <label>FPS:</label><input id="fps" value="10">
      <label>JPEG Q:</label><input id="q" value="80">

      <!-- Navigate dropdown -->
      <div class="navmenu" id="navwrap">
        <button class="navbtn" id="navbtn" aria-haspopup="true" aria-expanded="false">
          <span class="dot" aria-hidden="true"></span>
          Navigate
          <svg class="caret" width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M6 9l6 6 6-6" stroke="#cfe3ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
        <div class="menu" id="navmenu" hidden>
          <a href="/">🏠 Control Panel</a>
          <a href="/grid">🧩 Detection Multi-View</a>
          <a href="/grid_raw">🎥 Raw Camera Multi-View</a>
          <a href="/offline">🧪 Offline Analysis</a>
          <a href="/roboflow">🔗 Roboflow (Hosted)</a>
          <a href="/speed">🚗 Speed (Calibrated)</a>
          <a href="/library">🗂️ Library</a>
        </div>
      </div>
    </div>

    <div id="grid" class="grid"></div>
  </div>

  <script>
    /* Dropdown toggler */
    (function () {
      const wrap = document.getElementById('navwrap');
      const btn = document.getElementById('navbtn');
      const menu = document.getElementById('navmenu');
      if (!wrap || !btn || !menu) return;

      const open = () => { wrap.classList.add('open'); btn.setAttribute('aria-expanded', 'true'); menu.hidden = false; };
      const close = () => { wrap.classList.remove('open'); btn.setAttribute('aria-expanded', 'false'); menu.hidden = true; };

      btn.addEventListener('click', (e) => { e.stopPropagation(); menu.hidden ? open() : close(); });
      document.addEventListener('click', () => close());
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') close(); });
    })();

    async function loadTopics() {
      const r = await fetch('/api/topics');
      const data = await r.json();
      const topics = data.topics || [];
      const g = document.getElementById('grid');
      g.innerHTML = '';
      const w = document.getElementById('w').value;
      const fps = document.getElementById('fps').value;
      const q = document.getElementById('q').value;
      topics.forEach(t => {
        const div = document.createElement('div');
        div.className = 'tile';
        const title = document.createElement('div');
        title.className = 'title';
        title.textContent = t;
        const img = document.createElement('img');
        img.src = `/stream?topic=${encodeURIComponent(t)}&w=${w}&fps=${fps}&q=${q}`;
        div.appendChild(title);
        div.appendChild(img);
        g.appendChild(div);
      });
      document.getElementById('count').textContent = `${topics.length} stream(s)`;
    }
    loadTopics();
  </script>
</body>

</html>
