{% extends "index.html" %}
{% block title %}Detection Multi-View — Traffic Analysis Dashboard{% endblock %}

{% block breadcrumb %}
<nav class="breadcrumb" aria-label="Breadcrumb">
  <a href="/">Home</a>
  <span class="breadcrumb-sep">›</span>
  <span class="breadcrumb-current">Detection Multi-View</span>
</nav>
{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-4px;margin-right:6px">
      <rect x="3" y="3" width="7" height="7" />
      <rect x="14" y="3" width="7" height="7" />
      <rect x="14" y="14" width="7" height="7" />
      <rect x="3" y="14" width="7" height="7" />
    </svg>
    Detection Multi-View
  </h1>
  <p class="page-subtitle">Live YOLO detection overlay streams from all cameras.</p>
</div>

<div class="toolbar">
  <button class="btn primary" onclick="loadTopics()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
      stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10" />
      <polyline points="1 20 1 14 7 14" />
      <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15" />
    </svg>
    Refresh Topics
  </button>
  <span id="count" class="muted-small"></span>
  <label class="toolbar-inline-label"><span class="muted-small">Width:</span><input id="w" value="720"
      style="width:70px"></label>
  <label class="toolbar-inline-label"><span class="muted-small">FPS:</span><input id="fps" value="10"
      style="width:56px"></label>
  <label class="toolbar-inline-label"><span class="muted-small">JPEG Q:</span><input id="q" value="80"
      style="width:56px"></label>
</div>

<div id="grid" class="multiview-grid">
  <!-- Skeleton placeholders -->
  <div class="skeleton skeleton-thumb"></div>
  <div class="skeleton skeleton-thumb"></div>
  <div class="skeleton skeleton-thumb"></div>
</div>

<script>
  async function loadTopics() {
    const r = await fetch('/api/topics');
    const data = await r.json();
    const topics = data.topics || [];
    const g = document.getElementById('grid');
    g.innerHTML = '';
    const w = document.getElementById('w').value;
    const fps = document.getElementById('fps').value;
    const q = document.getElementById('q').value;
    if (topics.length === 0) {
      g.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📡</div><h3 class="empty-state-title">No Overlay Topics</h3><p class="empty-state-desc">Start the launch and come back to see live detection streams.</p></div>';
      document.getElementById('count').textContent = '0 streams';
      return;
    }
    topics.forEach(t => {
      const div = document.createElement('div');
      div.className = 'tile';
      const title = document.createElement('div');
      title.className = 'title';
      title.textContent = t;
      const img = document.createElement('img');
      img.src = `/stream?topic=${encodeURIComponent(t)}&w=${w}&fps=${fps}&q=${q}`;
      img.alt = 'Detection stream: ' + t;
      img.addEventListener('error', () => setTimeout(() => {
        img.src = `/stream?topic=${encodeURIComponent(t)}&w=${w}&fps=${fps}&q=${q}&_=${Date.now()}`;
      }, 800));
      div.appendChild(title);
      div.appendChild(img);
      g.appendChild(div);
    });
    document.getElementById('count').textContent = `${topics.length} stream(s)`;
  }
  loadTopics();
</script>
{% endblock %}
