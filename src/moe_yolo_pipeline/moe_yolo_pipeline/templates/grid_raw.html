<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Raw Camera Multi-View</title>
  <!-- use the same stylesheet name everywhere -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    body { background:#111; color:#eee; font-family: system-ui, sans-serif; }
    .toolbar { padding: 10px 14px; background:#1b1b1b; position: sticky; top:0; z-index:2; }
    .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(420px,1fr)); gap:16px; padding:16px; }
    .card { background:#181818; border-radius:12px; padding:10px; box-shadow: 0 2px 8px rgba(0,0,0,.4); }
    .card h3 { margin:6px 8px 8px 8px; font-size: 13px; color:#bbb; font-weight: 600; }
    .card img { width:100%; height:auto; border-radius: 8px; display:block; background:#000; }
    input { background:#111; color:#eee; border:1px solid #333; border-radius:6px; padding:4px 8px; }
    label { font-size: 12px; margin-right: 6px; color:#aaa; }
  </style>
</head>
<body>
  <div class="toolbar">
    <a href="/" style="color:#6cf;text-decoration:none;">← Back to Control Panel</a>
    &nbsp;&nbsp; {{ topics|length }} stream(s)
    &nbsp;&nbsp; <label>Width:</label><input id="w" value="720" size="4">
    &nbsp;&nbsp; <label>FPS:</label><input id="fps" value="15" size="3">
    &nbsp;&nbsp; <label>JPEG Q:</label><input id="q" value="80" size="3">
    &nbsp;&nbsp; <button onclick="refresh()">Apply</button>
  </div>

  <div class="grid" id="grid">
    {% for t in topics %}
    <div class="card">
      <h3>{{ t }}</h3>
      <img src="{{ url_for('stream', topic=t, w=720, fps=15, q=80) }}" data-topic="{{ t }}">
    </div>
    {% endfor %}
  </div>

  {% if topics|length == 0 %}
  <div style="padding:16px;color:#aaa;">
    No raw camera topics found. Start the launch (or enable <code>publish_raw</code>) and refresh.
  </div>
  {% endif %}

  <script>
    function refresh() {
      const w = document.getElementById('w').value || 720;
      const fps = document.getElementById('fps').value || 15;
      const q = document.getElementById('q').value || 80;
      document.querySelectorAll('img[data-topic]').forEach(img => {
        const t = img.dataset.topic;
        img.src = `/stream?topic=${encodeURIComponent(t)}&w=${w}&fps=${fps}&q=${q}&_=${Date.now()}`;
      });
    }
    document.querySelectorAll('img').forEach(img=>{
      img.addEventListener('error', ()=> setTimeout(()=> {
        img.src = img.src.split('&_=' )[0] + '&_=' + Date.now();
      }, 1000));
    });
  </script>
</body>
</html>
