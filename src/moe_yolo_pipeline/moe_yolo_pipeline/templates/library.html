{% extends "index.html" %}
{% block content %}
<section class="card">
  <h2>Analysis Library</h2>
  <div class="row" style="gap:8px;align-items:center">
    <input id="q" placeholder="Search filename / model / classes" style="flex:1;min-width:260px">
    <button id="refresh" class="btn">Refresh</button>
  </div>
</section>

<section class="card" style="background:transparent;border:none;padding:0">
  <div id="grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:16px"></div>
</section>

<script>
async function fetchJSON(url, opts) {
  const r = await fetch(url, opts || {});
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
function chip(text){ const s=document.createElement('span'); s.className='badge'; s.style.marginRight='6px'; s.textContent=text; return s }
function small(text){ const s=document.createElement('div'); s.className='muted-small'; s.textContent=text; return s }

async function load(q=""){
  const j = await fetchJSON('/api/library'+(q?`?q=${encodeURIComponent(q)}`:''));
  const grid = document.getElementById('grid'); grid.innerHTML='';
  (j.items||[]).forEach(it=>{
    const card = document.createElement('div');
    card.className = 'card';
    // header
    const h = document.createElement('div');
    h.style.marginBottom='8px';
    h.appendChild(small(`${it.filename || ''} · ${it.created_at || ''}`));
    card.appendChild(h);
    // media
    const box = document.createElement('div');
    box.style.marginBottom='8px';
    const vid = document.createElement('video');
    vid.controls = true; vid.playsInline = true; vid.muted = true;
    if (it.poster_url) vid.poster = it.poster_url;
    vid.src = it.video_url;
    vid.style.width = '100%'; vid.style.borderRadius = '8px';
    box.appendChild(vid); card.appendChild(box);

    // tags
    const row1 = document.createElement('div');
    row1.style.marginBottom='6px';
    row1.appendChild(chip(it.model || ''));
    if (it.include){
      const inc = (it.include||'').split(',').map(s=>s.trim()).filter(Boolean).join(' · ');
      row1.appendChild(chip(inc));
    }
    card.appendChild(row1);

    // counts
    const row2 = document.createElement('div');
    const stats = it.class_stats || {};
    Object.keys(stats).sort().forEach(k=>{
      row2.appendChild(chip(`${k}: ${stats[k]}`));
    });
    const uniq = document.createElement('span');
    uniq.className='badge'; uniq.textContent = `unique: ${Object.values(stats).reduce((a,b)=>a+b,0)}`;
    uniq.style.marginLeft='6px';
    row2.appendChild(uniq);
    card.appendChild(row2);

    // actions
    const row3 = document.createElement('div');
    row3.className='row'; row3.style.marginTop='8px';
    const aCsv = document.createElement('a'); aCsv.href = it.csv_url; aCsv.className='btn'; aCsv.textContent='Download CSV';
    const aJson = document.createElement('a'); aJson.href = it.json_url; aJson.className='btn'; aJson.textContent='Download Summary';
    const del = document.createElement('button'); del.className='btn danger'; del.textContent='Delete';
    del.onclick = async ()=>{
      if (!confirm('Delete this analysis?')) return;
      await fetch('/api/library/'+it.id+'/delete', {method:'POST'});
      load(document.getElementById('q').value);
    };
    row3.appendChild(aCsv); row3.appendChild(aJson); row3.appendChild(del);
    card.appendChild(row3);

    grid.appendChild(card);
  });
}
document.getElementById('refresh').onclick = ()=>load(document.getElementById('q').value);
document.getElementById('q').addEventListener('keydown', e=>{
  if (e.key==='Enter') load(e.target.value);
});
load();
</script>
{% endblock %}
